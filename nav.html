<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0f0f1a;
      font-family: 'DM Mono', monospace;
      border-right: 2px solid #6c63ff;
      height: 100vh;
      overflow: hidden;
    }

    .nav-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #444;
      padding: 16px 16px 10px;
      text-transform: uppercase;
    }

    a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      text-decoration: none;
      color: #888;
      font-size: 0.68rem;
      letter-spacing: 0.5px;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    a:hover {
      color: #fff;
      background: rgba(108,99,255,0.1);
      border-left-color: #6c63ff;
    }

    a .em { font-size: 1rem; }

    a .label { flex: 1; }

    a .tag {
      font-size: 0.48rem;
      background: rgba(108,99,255,0.15);
      color: #6c63ff;
      border: 1px solid rgba(108,99,255,0.3);
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    .divider {
      height: 1px;
      background: #1a1a2e;
      margin: 6px 0;
    }

    .frame-tag {
      position: absolute;
      bottom: 10px; left: 0; right: 0;
      text-align: center;
      font-size: 0.5rem;
      color: #2a2a4a;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="nav-title">◈ Pages</div>

  <!-- target="main" loads into the main frame -->
  <a href="map.html" target="main">
    <span class="em">🗺️</span>
    <span class="label">Google Maps</span>
    <span class="tag">iframe</span>
  </a>

  <div class="divider"></div>

  <a href="external.html" target="main">
    <span class="em">🌐</span>
    <span class="label">External Page</span>
    <span class="tag">iframe</span>
  </a>

  <div class="divider"></div>

  <a href="video.html" target="main">
    <span class="em">▶️</span>
    <span class="label">YouTube Embed</span>
    <span class="tag">iframe</span>
  </a>

  <div class="divider"></div>

  <a href="theory.html" target="main">
    <span class="em">📋</span>
    <span class="label">Theory</span>
    <span class="tag">info</span>
  </a>

  <div class="divider"></div>

  <!-- _top breaks out of all frames -->
  <a href="index.html" target="_top">
    <span class="em">🔄</span>
    <span class="label">Reload All</span>
    <span class="tag">_top</span>
  </a>

  <div class="frame-tag">FRAME: navFrame · cols="180px"</div>

</body>
</html>
