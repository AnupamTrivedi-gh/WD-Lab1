<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: linear-gradient(90deg, #0f0f1a 0%, #1a1040 50%, #0f0f1a 100%);
      border-bottom: 2px solid #6c63ff;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 36px; height: 36px;
      background: #6c63ff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.15rem;
      color: #fff;
      letter-spacing: 1px;
    }

    h1 span { color: #6c63ff; }

    .sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: #666;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: #4ade80;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>
  <div class="brand">
    <div class="icon">🖼️</div>
    <div>
      <h1>HTML <span>Frames</span> Demo</h1>
      <div class="sub">WEB TECHNOLOGY LAB · S.B. JAIN ITM&R</div>
    </div>
  </div>
  <div class="badge"><span class="dot"></span>FRAME: headerFrame</div>
</body>
</html>
