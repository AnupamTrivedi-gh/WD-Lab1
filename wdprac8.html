<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <h2>My Gallery</h2>
    </nav>

    <!-- Title -->
    <h1 class="title">Beautiful Image Gallery</h1>

    <!-- Gallery -->
    <div class="gallery">

        <div class="card">
            <img src="https://picsum.photos/id/1015/400/300" alt="Nature">
            <div class="caption">Nature</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1016/400/300" alt="Mountains">
            <div class="caption">Mountains</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1018/400/300" alt="River">
            <div class="caption">River</div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1020/400/300" alt="Forest">
            <div class="caption">Forest</div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Image Gallery | Designed with CSS</p>
    </footer>

</body>
</html>
